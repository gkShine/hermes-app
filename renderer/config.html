<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>Hermes App Config</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #eee;
    }
    .container {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 40px;
      max-width: 560px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
    }
    .header img {
      width: 64px;
      height: 64px;
      border-radius: 14px;
    }
    h1 {
      font-size: 24px;
      color: #00d4ff;
    }
    .subtitle {
      color: #888;
      margin-bottom: 32px;
      font-size: 14px;
    }
    .lang-switch {
      text-align: right;
      margin-bottom: 16px;
    }
    .lang-switch button {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: #888;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .lang-switch button:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .form-group {
      margin-bottom: 24px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #ccc;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-size: 15px;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #00d4ff;
    }
    .path-status {
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .path-status.valid {
      display: block;
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.3);
      color: #00ff88;
    }
    .path-status.invalid {
      display: block;
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid rgba(255, 68, 68, 0.3);
      color: #ff4444;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      color: #000;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0, 212, 255, 0.4);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #ccc;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .btn-link {
      background: none;
      color: #00d4ff;
      text-decoration: underline;
      flex: none;
      padding: 12px;
    }
    .link-section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }
    .link-section p {
      color: #888;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0, 0, 0, 0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error-msg {
      color: #ff4444;
      margin-top: 8px;
      font-size: 13px;
      display: none;
    }
    .error-msg.show {
      display: block;
    }
    .progress-container {
      margin-top: 16px;
      display: none;
    }
    .progress-container.show {
      display: block;
    }
    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff 0%, #00ff88 100%);
      width: 0%;
      transition: width 0.3s;
    }
    .progress-text {
      margin-top: 8px;
      font-size: 13px;
      color: #888;
    }
    .agent-warning {
      background: rgba(255, 170, 0, 0.1);
      border: 1px solid rgba(255, 170, 0, 0.3);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: center;
      display: none;
    }
    .agent-warning.show {
      display: block;
    }
    .agent-warning p {
      color: #ffaa00;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .agent-warning a {
      color: #00d4ff;
      text-decoration: none;
    }
    .agent-warning a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="lang-switch">
      <button id="langBtn">EN / 中文</button>
    </div>

    <div class="header">
      <img src="icon.png" alt="Hermes">
      <h1 data-i18n="title">Hermes App Config</h1>
    </div>
    <p class="subtitle" data-i18n="subtitle">Configure the hermes-webui installation path</p>

    <div class="agent-warning" id="agentWarning">
      <p data-i18n="agentWarning">Please install Hermes Agent first before using</p>
      <a href="#" id="agentLink" data-i18n="agentLink">https://get-hermes.ai/</a>
    </div>

    <div class="form-group">
      <label for="hermesPath" data-i18n="pathLabel">hermes-webui Path</label>
      <input type="text" id="hermesPath" placeholder="/Users/username/Work/hermes-webui">
      <div id="pathStatus" class="path-status"></div>
      <div id="errorMsg" class="error-msg"></div>
    </div>

    <div class="btn-group">
      <button id="checkBtn" class="btn-secondary" data-i18n="checkBtn">Check Path</button>
      <button id="saveBtn" class="btn-primary" data-i18n="saveBtn">Save & Launch</button>
    </div>

    <div class="link-section">
      <p data-i18n="noHermes">Don't have hermes-webui?</p>
      <button id="downloadBtn" class="btn-secondary" data-i18n="downloadBtn">Download from GitHub</button>
      <button id="installBtn" class="btn-primary" data-i18n="installBtn">Auto Install</button>
    </div>

    <div id="progressContainer" class="progress-container">
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <p id="progressText" class="progress-text"></p>
    </div>
  </div>

  <script>
    const i18n = {
      en: {
        title: 'Hermes App Config',
        subtitle: 'Configure the hermes-webui installation path',
        pathLabel: 'hermes-webui Path',
        pathPlaceholder: '/Users/username/Work/hermes-webui',
        pathValid: '✓ Path is valid',
        pathInvalid: '✗ Path invalid or start.sh not found',
        checkBtn: 'Check Path',
        saveBtn: 'Save & Launch',
        noHermes: "Don't have hermes-webui?",
        downloadBtn: 'Download from GitHub',
        installBtn: 'Auto Install',
        checking: 'Checking...',
        launching: 'Launching...',
        installing: 'Installing...',
        downloadProgress: 'Downloading: ',
        extracting: 'Extracting...',
        installSuccess: 'Installation complete!',
        installError: 'Installation failed: ',
        enterPath: 'Please enter a path',
        invalidPath: 'Invalid path, please ensure start.sh exists',
        agentWarning: 'Please install Hermes Agent first before using',
        agentLink: 'https://get-hermes.ai/'
      },
      zh: {
        title: 'Hermes App 配置',
        subtitle: '请配置 hermes-webui 的安装路径',
        pathLabel: 'hermes-webui 路径',
        pathPlaceholder: '/Users/用户名/Work/hermes-webui',
        pathValid: '✓ 路径有效',
        pathInvalid: '✗ 路径无效或 start.sh 不存在',
        checkBtn: '检查路径',
        saveBtn: '保存并启动',
        noHermes: '还没有 hermes-webui？',
        downloadBtn: '前往 GitHub 下载',
        installBtn: '自动安装',
        checking: '检查中...',
        launching: '启动中...',
        installing: '安装中...',
        downloadProgress: '下载中: ',
        extracting: '解压中...',
        installSuccess: '安装完成！',
        installError: '安装失败: ',
        enterPath: '请输入路径',
        invalidPath: '路径无效，请确认 start.sh 文件存在',
        agentWarning: '请先安装 Hermes Agent 后再使用',
        agentLink: 'https://get-hermes.ai/'
      }
    };

    let currentLang = 'en';
    let currentValid = false;

    const hermesPathInput = document.getElementById('hermesPath');
    const pathStatus = document.getElementById('pathStatus');
    const errorMsg = document.getElementById('errorMsg');
    const checkBtn = document.getElementById('checkBtn');
    const saveBtn = document.getElementById('saveBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const installBtn = document.getElementById('installBtn');
    const langBtn = document.getElementById('langBtn');
    const agentLink = document.getElementById('agentLink');
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    function setLang(lang) {
      currentLang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[lang][key]) {
          el.textContent = i18n[lang][key];
        }
      });
      hermesPathInput.placeholder = i18n[lang].pathPlaceholder;
      if (currentValid) {
        pathStatus.textContent = i18n[lang].pathValid;
      }
    }

    langBtn.addEventListener('click', () => {
      setLang(currentLang === 'en' ? 'zh' : 'en');
    });

    function updateStatus(valid, message) {
      currentValid = valid;
      pathStatus.className = 'path-status ' + (valid ? 'valid' : 'invalid');
      pathStatus.textContent = message || (valid ? i18n[currentLang].pathValid : i18n[currentLang].pathInvalid);
    }

    async function loadConfig() {
      const config = await window.electronAPI.config.get();
      if (config.hermesPath) {
        hermesPathInput.value = config.hermesPath;
        updateStatus(config.hermesPathValid);
      }

      // Check if hermes CLI is installed
      const cliResult = await window.electronAPI.config.checkHermesCLI();
      if (!cliResult.hermesCLIExists) {
        document.getElementById('agentWarning').classList.add('show');
      }

      // Auto detect language
      const browserLang = navigator.language.toLowerCase();
      setLang(browserLang.startsWith('zh') ? 'zh' : 'en');
    }

    checkBtn.addEventListener('click', async () => {
      const path = hermesPathInput.value.trim();
      if (!path) {
        errorMsg.textContent = i18n[currentLang].enterPath;
        errorMsg.classList.add('show');
        return;
      }
      errorMsg.classList.remove('show');
      checkBtn.innerHTML = '<span class="spinner"></span>' + i18n[currentLang].checking;
      checkBtn.disabled = true;

      const result = await window.electronAPI.config.set(path);
      updateStatus(result.hermesPathValid);

      checkBtn.textContent = i18n[currentLang].checkBtn;
      checkBtn.disabled = false;
    });

    saveBtn.addEventListener('click', async () => {
      const path = hermesPathInput.value.trim();
      if (!path) {
        errorMsg.textContent = i18n[currentLang].enterPath;
        errorMsg.classList.add('show');
        return;
      }
      errorMsg.classList.remove('show');
      saveBtn.innerHTML = '<span class="spinner"></span>' + i18n[currentLang].launching;
      saveBtn.disabled = true;

      const result = await window.electronAPI.config.startHermes(path);

      if (result.success) {
        await window.electronAPI.config.loadUrl();
      } else if (result.error === 'invalid_path') {
        errorMsg.textContent = i18n[currentLang].invalidPath;
        errorMsg.classList.add('show');
        updateStatus(false);
      }

      saveBtn.textContent = i18n[currentLang].saveBtn;
      saveBtn.disabled = false;
    });

    downloadBtn.addEventListener('click', () => {
      window.electronAPI.shell.openExternal('https://github.com/nesquena/hermes-webui');
    });

    agentLink.addEventListener('click', (e) => {
      e.preventDefault();
      window.electronAPI.shell.openExternal('https://get-hermes.ai/');
    });

    installBtn.addEventListener('click', async () => {
      installBtn.disabled = true;
      downloadBtn.disabled = true;
      checkBtn.disabled = true;
      saveBtn.disabled = true;
      errorMsg.classList.remove('show');
      progressContainer.classList.add('show');
      progressFill.style.width = '0%';
      progressText.textContent = i18n[currentLang].downloading;

      // Listen for progress updates BEFORE starting install
      const progressHandler = (progress) => {
        progressFill.style.width = progress + '%';
        progressText.textContent = i18n[currentLang].downloadProgress + progress + '%';
      };
      window.electronAPI.config.onInstallProgress(progressHandler);

      const result = await window.electronAPI.config.installHermes();

      // Remove listener after install completes
      window.electronAPI.config.removeInstallProgressListener(progressHandler);

      if (result.success) {
        progressText.textContent = i18n[currentLang].installSuccess;
        hermesPathInput.value = result.installPath;

        // Check if path is valid
        const configResult = await window.electronAPI.config.check();
        updateStatus(configResult.hermesPathValid);

        // Auto launch after short delay
        setTimeout(async () => {
          const startResult = await window.electronAPI.config.startHermes(result.installPath);
          if (startResult.success) {
            await window.electronAPI.config.loadUrl();
          }
        }, 500);
      } else {
        progressContainer.classList.remove('show');
        errorMsg.textContent = i18n[currentLang].installError + result.error;
        errorMsg.classList.add('show');
      }

      installBtn.disabled = false;
      downloadBtn.disabled = false;
      checkBtn.disabled = false;
      saveBtn.disabled = false;
    });

    loadConfig();
  </script>
</body>
</html>
